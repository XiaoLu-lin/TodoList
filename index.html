<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card app-card">
        <header class="hero">
          <div>
            <p class="eyebrow">Simple · Focused · Synced</p>
            <h1>待办清单</h1>
            <p class="subtitle">轻量管理今天要做的事，当前版本已接入本地后端持久化。</p>
          </div>
          <div class="summary" aria-label="任务统计">
            <div>
              <span id="totalCount">0</span>
              <small>全部</small>
            </div>
            <div>
              <span id="activeCount">0</span>
              <small>未完成</small>
            </div>
            <div>
              <span id="completedCount">0</span>
              <small>已完成</small>
            </div>
          </div>
        </header>

        <form id="todoForm" class="todo-form">
          <label class="sr-only" for="todoInput">新增待办</label>
          <input id="todoInput" name="todo" type="text" maxlength="120" placeholder="输入待办事项，例如：整理需求文档" autocomplete="off" />
          <button type="submit">新增待办</button>
        </form>

        <section class="toolbar">
          <div class="filters" role="tablist" aria-label="待办筛选">
            <button class="filter is-active" data-filter="all" type="button">全部</button>
            <button class="filter" data-filter="active" type="button">未完成</button>
            <button class="filter" data-filter="completed" type="button">已完成</button>
          </div>
          <div class="toolbar-meta">
            <p id="statusText" class="status-text">正在加载任务列表...</p>
            <small id="syncText" class="sync-text">等待连接服务器...</small>
          </div>
        </section>

        <section id="emptyState" class="empty-state">
          <div class="empty-icon">✓</div>
          <h2>还没有待办事项</h2>
          <p>先添加一条任务，开始管理今天的计划。</p>
        </section>

        <ul id="todoList" class="todo-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <label class="todo-check">
          <input class="toggle" type="checkbox" />
          <span class="checkmark"></span>
        </label>
        <div class="todo-body">
          <div class="todo-view">
            <p class="todo-title"></p>
            <small class="todo-meta"></small>
          </div>
          <form class="todo-edit hidden">
            <input class="edit-input" type="text" maxlength="120" />
            <div class="edit-actions">
              <button type="submit" class="save-btn">保存</button>
              <button type="button" class="ghost-btn cancel-btn">取消</button>
            </div>
          </form>
        </div>
        <div class="todo-actions">
          <button type="button" class="ghost-btn edit-btn">编辑</button>
          <button type="button" class="ghost-btn danger delete-btn">删除</button>
        </div>
      </li>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
